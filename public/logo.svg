<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0A0A0A" rx="28"/>

  <!-- Subtle outer ring -->
  <circle cx="200" cy="180" r="150" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.12"/>

  <!-- Shield body -->
  <path d="M200 48 L306 90 L306 196 Q306 272 200 312 Q94 272 94 196 L94 90 Z"
    fill="url(#shieldGrad)" stroke="#DC2626" stroke-width="2.5"/>

  <!-- Shield inner border accent -->
  <path d="M200 66 L290 104 L290 196 Q290 260 200 296 Q110 260 110 196 L110 104 Z"
    fill="none" stroke="#DC2626" stroke-width="1" opacity="0.3"/>

  <!-- Lightning bolt — bold, centered inside shield -->
  <polygon points="218,78 168,188 202,188 182,278 240,158 205,158"
    fill="url(#redGrad)"/>

  <!-- Bottom wordmark -->
  <text x="200" y="350"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="30"
    fill="white"
    letter-spacing="10">INNOVA</text>

  <text x="200" y="376"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="12"
    fill="#DC2626"
    letter-spacing="5.5">ACABADOS GLOBAL</text>
</svg>
